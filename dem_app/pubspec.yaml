name: dem_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  provider: ^6.1.2
  go_router: ^14.2.0

  # Audio + Speech
  record: ^6.2.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.0

  # File handling
  file_picker: ^8.0.0
  path_provider: ^2.1.5

  # Markdown rendering
  flutter_markdown: ^0.7.1

  # PDF generation
  pdf: ^3.11.3

  # Sharing (PDF etc.)
  share_plus: ^7.2.1

  # PDF preview
  printing: ^5.13.4

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Networking
  http: ^1.6.0
  http_parser: ^4.0.2

  # Storage
  flutter_secure_storage: ^10.0.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/pencil.png
    - assets/watch.jpg